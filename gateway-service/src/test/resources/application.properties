spring.main.web-application-type=reactive
spring.cloud.compatibility-verifier.enabled=false

services.accounts.url=http://accounts-service:8081
services.cash.url=http://cash-service:8082
services.transfer.url=http://transfer-service:8085

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:9095/realms/bank-realm/protocol/openid-connect/certs
spring.security.oauth2.client.provider.keycloak.token-uri=http://localhost:9095/realms/bank-realm/protocol/openid-connect/token
spring.security.oauth2.client.provider.keycloak.authorization-uri=http://localhost:9095/realms/bank-realm/protocol/openid-connect/auth
spring.security.oauth2.client.provider.keycloak.user-info-uri=http://localhost:9095/realms/bank-realm/protocol/openid-connect/userinfo
spring.security.oauth2.client.provider.keycloak.jwk-set-uri=http://localhost:9095/realms/bank-realm/protocol/openid-connect/certs
spring.security.oauth2.client.registration.keycloak.client-id=gateway-client
spring.security.oauth2.client.registration.keycloak.client-secret=test-secret
spring.security.oauth2.client.registration.keycloak.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.keycloak.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.keycloak.scope=openid
