services:
  postgres:
    image: postgres:16-alpine
    container_name: bank-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=ru_RU.UTF-8"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '1.0'
          memory: 512M
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    networks:
      - bank-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: bank-keycloak
    restart: unless-stopped
    command: start --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:${POSTGRES_PORT}/${POSTGRES_DB}
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_DB_SCHEMA: keycloak_schema
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HTTP_ENABLED: true
      KC_HTTP_PORT: ${KEYCLOAK_PORT}
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME}
      KC_HOSTNAME_PORT: ${KEYCLOAK_PORT}
      KC_HOSTNAME_STRICT: false
      KC_HOSTNAME_STRICT_HTTPS: false
      KC_PROXY: edge
      KC_HEALTH_ENABLED: true
      KC_SPI_THEME_WELCOME_THEME: bank-theme
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 2G
        reservations:
          cpus: '2.0'
          memory: 1G
    ports:
      - "${KEYCLOAK_PORT}:${KEYCLOAK_PORT}"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
      - ./keycloak/themes/bank-theme:/opt/keycloak/themes/bank-theme
    networks:
      - bank-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/${KEYCLOAK_PORT};echo -e \"GET /health/ready HTTP/1.1\\nhost: 127.0.0.1:${KEYCLOAK_PORT}\\n\" >&3;grep -q '200 OK' <&3"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  config-server:
    build:
      context: .
      dockerfile: ./config-server/Dockerfile
    container_name: bank-config-server
    restart: unless-stopped
    environment:
      CONFIG_SERVER_PORT: ${CONFIG_SERVER_PORT}
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '1.0'
          memory: 512M
    networks:
      - bank-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:${CONFIG_SERVER_PORT}/actuator/health || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 60s

  eureka-server:
    build:
      context: .
      dockerfile: ./eureka-server/Dockerfile
    container_name: bank-eureka-server
    restart: unless-stopped
    environment:
      CONFIG_SERVER_PORT: ${CONFIG_SERVER_PORT}
      EUREKA_SERVER_PORT: ${EUREKA_SERVER_PORT}
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '1.0'
          memory: 512M
    ports:
      - "${EUREKA_SERVER_PORT}:${EUREKA_SERVER_PORT}"
    networks:
      - bank-network
    depends_on:
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:${EUREKA_SERVER_PORT}/actuator/health || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 90s

  gateway-service:
    build:
      context: .
      dockerfile: ./gateway-service/Dockerfile
    container_name: bank-gateway-service
    restart: unless-stopped
    environment:
      CONFIG_SERVER_PORT: ${CONFIG_SERVER_PORT}
      GATEWAY_PORT: ${GATEWAY_PORT}
      EUREKA_SERVER_PORT: ${EUREKA_SERVER_PORT}
      GATEWAY_CLIENT_SECRET: ${GATEWAY_CLIENT_SECRET}
      KEYCLOAK_EXTERNAL_URL: ${KEYCLOAK_EXTERNAL_URL}
      KEYCLOAK_INTERNAL_URL: ${KEYCLOAK_INTERNAL_URL}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1536M
        reservations:
          cpus: '1.0'
          memory: 768M
    ports:
      - "${GATEWAY_PORT}:${GATEWAY_PORT}"
    networks:
      - bank-network
    depends_on:
      eureka-server:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:${GATEWAY_PORT}/actuator/health || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 90s

  accounts-service:
    build:
      context: .
      dockerfile: ./accounts-service/Dockerfile
    container_name: bank-accounts-service
    restart: unless-stopped
    environment:
      CONFIG_SERVER_PORT: ${CONFIG_SERVER_PORT}
      ACCOUNTS_SERVICE_PORT: ${ACCOUNTS_SERVICE_PORT}
      EUREKA_SERVER_PORT: ${EUREKA_SERVER_PORT}
      DB_PASSWORD: ${DB_PASSWORD}
      MICROSERVICES_CLIENT_SECRET: ${MICROSERVICES_CLIENT_SECRET}
      KEYCLOAK_EXTERNAL_URL: ${KEYCLOAK_EXTERNAL_URL}
      KEYCLOAK_INTERNAL_URL: ${KEYCLOAK_INTERNAL_URL}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1536M
        reservations:
          cpus: '1.0'
          memory: 768M
    ports:
      - "${ACCOUNTS_SERVICE_PORT}:${ACCOUNTS_SERVICE_PORT}"
    networks:
      - bank-network
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:${ACCOUNTS_SERVICE_PORT}/actuator/health || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 90s

  cash-service:
    build:
      context: .
      dockerfile: ./cash-service/Dockerfile
    container_name: bank-cash-service
    restart: unless-stopped
    environment:
      CONFIG_SERVER_PORT: ${CONFIG_SERVER_PORT}
      CASH_SERVICE_PORT: ${CASH_SERVICE_PORT}
      EUREKA_SERVER_PORT: ${EUREKA_SERVER_PORT}
      MICROSERVICES_CLIENT_SECRET: ${MICROSERVICES_CLIENT_SECRET}
      KEYCLOAK_EXTERNAL_URL: ${KEYCLOAK_EXTERNAL_URL}
      KEYCLOAK_INTERNAL_URL: ${KEYCLOAK_INTERNAL_URL}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1536M
        reservations:
          cpus: '1.0'
          memory: 768M
    ports:
      - "${CASH_SERVICE_PORT}:${CASH_SERVICE_PORT}"
    networks:
      - bank-network
    depends_on:
      eureka-server:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      accounts-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:${CASH_SERVICE_PORT}/actuator/health || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 90s

  auth-service:
    build:
      context: .
      dockerfile: ./auth-service/Dockerfile
    container_name: bank-auth-service
    restart: unless-stopped
    environment:
      CONFIG_SERVER_PORT: ${CONFIG_SERVER_PORT}
      AUTH_SERVICE_PORT: ${AUTH_SERVICE_PORT}
      EUREKA_SERVER_PORT: ${EUREKA_SERVER_PORT}
      DB_PASSWORD: ${DB_PASSWORD}
      KEYCLOAK_EXTERNAL_URL: ${KEYCLOAK_EXTERNAL_URL}
      KEYCLOAK_INTERNAL_URL: ${KEYCLOAK_INTERNAL_URL}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '1.0'
          memory: 512M
    networks:
      - bank-network
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:${AUTH_SERVICE_PORT}/actuator/health || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 90s

  transfer-service:
    build:
      context: .
      dockerfile: ./transfer-service/Dockerfile
    container_name: bank-transfer-service
    restart: unless-stopped
    environment:
      CONFIG_SERVER_PORT: ${CONFIG_SERVER_PORT}
      TRANSFER_SERVICE_PORT: ${TRANSFER_SERVICE_PORT}
      EUREKA_SERVER_PORT: ${EUREKA_SERVER_PORT}
      MICROSERVICES_CLIENT_SECRET: ${MICROSERVICES_CLIENT_SECRET}
      KEYCLOAK_EXTERNAL_URL: ${KEYCLOAK_EXTERNAL_URL}
      KEYCLOAK_INTERNAL_URL: ${KEYCLOAK_INTERNAL_URL}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1536M
        reservations:
          cpus: '1.0'
          memory: 768M
    ports:
      - "${TRANSFER_SERVICE_PORT}:${TRANSFER_SERVICE_PORT}"
    networks:
      - bank-network
    depends_on:
      eureka-server:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      accounts-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:${TRANSFER_SERVICE_PORT}/actuator/health || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 90s

  notifications-service:
    build:
      context: .
      dockerfile: ./notifications-service/Dockerfile
    container_name: bank-notifications-service
    restart: unless-stopped
    environment:
      CONFIG_SERVER_PORT: ${CONFIG_SERVER_PORT}
      NOTIFICATIONS_SERVICE_PORT: ${NOTIFICATIONS_SERVICE_PORT}
      EUREKA_SERVER_PORT: ${EUREKA_SERVER_PORT}
      KEYCLOAK_EXTERNAL_URL: ${KEYCLOAK_EXTERNAL_URL}
      KEYCLOAK_INTERNAL_URL: ${KEYCLOAK_INTERNAL_URL}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '1.0'
          memory: 512M
    networks:
      - bank-network
    depends_on:
      eureka-server:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:${NOTIFICATIONS_SERVICE_PORT}/actuator/health || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 90s

  front-service:
    build:
      context: .
      dockerfile: ./front-service/Dockerfile
    container_name: bank-front-service
    restart: unless-stopped
    environment:
      CONFIG_SERVER_PORT: ${CONFIG_SERVER_PORT}
      FRONT_SERVICE_PORT: ${FRONT_SERVICE_PORT}
      EUREKA_SERVER_PORT: ${EUREKA_SERVER_PORT}
      GATEWAY_PORT: ${GATEWAY_PORT}
      FRONT_CLIENT_SECRET: ${FRONT_CLIENT_SECRET}
      KEYCLOAK_EXTERNAL_URL: ${KEYCLOAK_EXTERNAL_URL}
      KEYCLOAK_INTERNAL_URL: ${KEYCLOAK_INTERNAL_URL}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1536M
        reservations:
          cpus: '1.0'
          memory: 768M
    ports:
      - "${FRONT_SERVICE_PORT}:${FRONT_SERVICE_PORT}"
    networks:
      - bank-network
    depends_on:
      gateway-service:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:${FRONT_SERVICE_PORT}/actuator/health || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 90s

volumes:
  postgres_data:
    driver: local

networks:
  bank-network:
    driver: bridge
