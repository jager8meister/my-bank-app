apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "notifications-service.fullname" . }}-config
  labels:
    app: notifications-service
data:
  NOTIFICATIONS_SERVICE_PORT: {{ .Values.global.services.notifications.port | quote }}
  NOTIFICATIONS_SERVICE_HOST: {{ .Values.global.services.notifications.host | quote }}
  KAFKA_BOOTSTRAP_SERVERS: {{ .Values.global.kafka.bootstrapServers | quote }}
  LOGSTASH_HOST: "logstash"
  LOGSTASH_PORT: "5000"
