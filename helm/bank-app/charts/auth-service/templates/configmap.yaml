apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "auth-service.fullname" . }}-config
  labels:
    app: auth-service
data:
  AUTH_SERVICE_PORT: {{ .Values.containerPort | quote }}
  POSTGRES_HOST: {{ .Values.global.postgres.host | quote }}
  POSTGRES_PORT: {{ .Values.global.postgres.port | quote }}
  POSTGRES_DB: {{ .Values.global.postgres.db | quote }}
  POSTGRES_USER: {{ .Values.global.postgres.user | quote }}
  KEYCLOAK_EXTERNAL_URL: {{ .Values.global.keycloak.externalUrl | quote }}
  KEYCLOAK_INTERNAL_URL: {{ .Values.global.keycloak.internalUrl | quote }}
  KEYCLOAK_REALM: {{ .Values.global.keycloak.realm | quote }}
  KEYCLOAK_ADMIN: {{ .Values.global.keycloak.adminUser | quote }}
  ACCOUNTS_SERVICE_HOST: {{ .Values.global.services.accounts.host | quote }}
  ACCOUNTS_SERVICE_PORT: {{ .Values.global.services.accounts.port | quote }}
