apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "gateway-service.fullname" . }}-config
  labels:
    app: gateway-service
data:
  GATEWAY_PORT: "8080"
  AUTH_SERVICE_HOST: "auth-service"
  AUTH_SERVICE_PORT: "8083"
  ACCOUNTS_SERVICE_HOST: "accounts-service"
  ACCOUNTS_SERVICE_PORT: "8081"
  CASH_SERVICE_HOST: "cash-service"
  CASH_SERVICE_PORT: "8082"
  TRANSFER_SERVICE_HOST: "transfer-service"
  TRANSFER_SERVICE_PORT: "8085"
  KEYCLOAK_EXTERNAL_URL: {{ .Values.global.keycloak.externalUrl | quote }}
  KEYCLOAK_INTERNAL_URL: "http://keycloak:9090"
  KEYCLOAK_REALM: {{ .Values.global.keycloak.realm | quote }}
