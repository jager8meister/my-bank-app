apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "postgres.fullname" . }}-init
  labels:
    app: postgres
data:
  01-create-users.sh: |
    #!/bin/bash
    set -e
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<EOSQL
    DO \$\$
    BEGIN
       IF NOT EXISTS (SELECT FROM pg_user WHERE usename = '${POSTGRES_USER}') THEN
          CREATE USER ${POSTGRES_USER} WITH PASSWORD '${POSTGRES_PASSWORD}';
          RAISE NOTICE 'User ${POSTGRES_USER} created successfully';
       ELSE
          RAISE NOTICE 'User ${POSTGRES_USER} already exists';
       END IF;
    END \$\$;
    EOSQL
  02-create-schemas.sql: |
    CREATE SCHEMA IF NOT EXISTS accounts_schema;
    COMMENT ON SCHEMA accounts_schema IS 'Accounts Service - User accounts and balances';

    CREATE SCHEMA IF NOT EXISTS auth_schema;
    COMMENT ON SCHEMA auth_schema IS 'Auth Service - Authentication and authorization data';

    CREATE SCHEMA IF NOT EXISTS keycloak_schema;
    COMMENT ON SCHEMA keycloak_schema IS 'Keycloak - Identity and Access Management';
  03-grant-privileges.sql: |
    GRANT ALL PRIVILEGES ON SCHEMA accounts_schema TO {{ .Values.global.postgres.user }};
    GRANT ALL PRIVILEGES ON SCHEMA auth_schema TO {{ .Values.global.postgres.user }};
    GRANT ALL PRIVILEGES ON SCHEMA keycloak_schema TO {{ .Values.global.postgres.user }};

    ALTER DEFAULT PRIVILEGES IN SCHEMA accounts_schema GRANT ALL ON TABLES TO {{ .Values.global.postgres.user }};
    ALTER DEFAULT PRIVILEGES IN SCHEMA accounts_schema GRANT ALL ON SEQUENCES TO {{ .Values.global.postgres.user }};

    ALTER DEFAULT PRIVILEGES IN SCHEMA auth_schema GRANT ALL ON TABLES TO {{ .Values.global.postgres.user }};
    ALTER DEFAULT PRIVILEGES IN SCHEMA auth_schema GRANT ALL ON SEQUENCES TO {{ .Values.global.postgres.user }};

    ALTER DEFAULT PRIVILEGES IN SCHEMA keycloak_schema GRANT ALL ON TABLES TO {{ .Values.global.postgres.user }};
    ALTER DEFAULT PRIVILEGES IN SCHEMA keycloak_schema GRANT ALL ON SEQUENCES TO {{ .Values.global.postgres.user }};

    ALTER USER {{ .Values.global.postgres.user }} SET search_path TO accounts_schema, auth_schema, keycloak_schema, public;
