apiVersion: v1
kind: Pod
metadata:
  name: {{ include "postgres.fullname" . }}-test-connection
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  containers:
    - name: test
      image: postgres:16-alpine
      env:
        - name: PGPASSWORD
          value: {{ .Values.global.postgres.password | quote }}
      command:
        - psql
        - -h
        - postgres
        - -U
        - {{ .Values.global.postgres.user | quote }}
        - -d
        - {{ .Values.global.postgres.db | quote }}
        - -c
        - "SELECT 1"
  restartPolicy: Never
