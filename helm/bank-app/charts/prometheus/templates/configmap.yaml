apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  labels:
    app: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - /etc/prometheus/alert-rules.yml

    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      - job_name: 'accounts-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['accounts-service:8081']

      - job_name: 'cash-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['cash-service:8082']

      - job_name: 'auth-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['auth-service:8083']

      - job_name: 'front-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['front-service:8084']

      - job_name: 'transfer-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['transfer-service:8085']

      - job_name: 'notifications-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['notifications-service:8086']

      - job_name: 'gateway-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['gateway-service:8080']

  alert-rules.yml: |
{{ .Files.Get "files/alert-rules.yml" | indent 4 }}
