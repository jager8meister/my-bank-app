apiVersion: v1
kind: Pod
metadata:
  name: {{ include "kafka.fullname" . }}-test-connection
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: test-connection
      image: busybox:1.36
      command: ["sh", "-c", "nc -z kafka 9092 && echo 'Kafka is reachable'"]
      resources:
        requests:
          cpu: 50m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi
