<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <title>Банк — Регистрация</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body class="bg-light">

<div id="notif-container"
     style="position:fixed;top:1rem;left:50%;transform:translateX(-50%);z-index:9999;min-width:320px;max-width:600px;display:flex;flex-direction:column;gap:0.5rem;">

    <div th:if="${error}"
         style="background:#dc3545;color:#fff;border-radius:6px;padding:0.75rem 1rem;display:flex;align-items:center;gap:0.75rem;box-shadow:0 4px 12px rgba(0,0,0,.25);">
        <span th:text="${error}" style="flex:1;font-weight:600;"></span>
        <button onclick="this.parentElement.remove()"
                style="background:none;border:none;color:#fff;font-size:1.4rem;line-height:1;cursor:pointer;padding:0;">&#x2715;</button>
    </div>


</div>

<div class="container p-2">
    <div class="row p-2">
        <div class="col">
            <h2>
                <span class="badge text-bg-info text-white">Банк</span>
            </h2>
        </div>
    </div>
    <div class="row p-2 justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    Регистрация
                </div>
                <div class="card-body">
                    <form method="post" th:action="@{/register}" id="registerForm">
                        <div class="form-group mb-3">
                            <h6><label for="login">Логин</label></h6>
                            <input type="text" class="form-control" id="login" name="login"
                                   placeholder="mylogin" th:value="${login}"
                                   pattern="[a-z0-9_\-]{3,20}"
                                   title="3–20 символов: строчные буквы, цифры, _ или -"
                                   minlength="3" maxlength="20"
                                   required>
                        </div>
                        <div class="form-group mb-3">
                            <h6><label for="password">Пароль</label></h6>
                            <input type="password" class="form-control" id="password" name="password"
                                   placeholder="Минимум 6 символов" minlength="6" required>
                        </div>
                        <div class="form-group mb-3">
                            <h6><label for="confirmPassword">Подтверждение пароля</label></h6>
                            <input type="password" class="form-control" id="confirmPassword" name="confirmPassword"
                                   placeholder="Повторите пароль" required>
                        </div>
                        <div class="form-group mb-3">
                            <h6><label for="name">Фамилия Имя</label></h6>
                            <input type="text" class="form-control" id="name" name="name"
                                   placeholder="Иванов Иван" th:value="${name}" maxlength="100" required>
                        </div>
                        <div class="form-group mb-3">
                            <h6><label for="birthdate">Дата рождения</label></h6>
                            <input type="date" class="form-control" id="birthdate" name="birthdate" required>
                        </div>
                        <button type="submit" class="btn btn-secondary w-100">Зарегистрироваться</button>
                    </form>
                    <div class="mt-3 text-center">
                        <a href="/login">Уже есть аккаунт? Войти</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.querySelectorAll('#notif-container > div').forEach(function(el) {
        setTimeout(function() { el.remove(); }, 30000);
    });
</script>
<script>
    // Validate age: must be 18+
    document.getElementById('birthdate').addEventListener('change', function () {
        const birthdate = new Date(this.value);
        const today = new Date();
        const age = today.getFullYear() - birthdate.getFullYear();
        const monthDiff = today.getMonth() - birthdate.getMonth();
        const dayDiff = today.getDate() - birthdate.getDate();
        const actualAge = monthDiff < 0 || (monthDiff === 0 && dayDiff < 0) ? age - 1 : age;

        if (actualAge < 18) {
            alert('Возраст должен быть не менее 18 лет');
            this.value = '';
        }
    });

    // Validate passwords match on submit
    document.getElementById('registerForm').addEventListener('submit', function (e) {
        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirmPassword').value;
        if (password !== confirm) {
            e.preventDefault();
            alert('Пароли не совпадают');
            return;
        }

        const birthdateVal = document.getElementById('birthdate').value;
        if (birthdateVal) {
            const birthdate = new Date(birthdateVal);
            const today = new Date();
            const age = today.getFullYear() - birthdate.getFullYear();
            const monthDiff = today.getMonth() - birthdate.getMonth();
            const dayDiff = today.getDate() - birthdate.getDate();
            const actualAge = monthDiff < 0 || (monthDiff === 0 && dayDiff < 0) ? age - 1 : age;
            if (actualAge < 18) {
                e.preventDefault();
                alert('Возраст должен быть не менее 18 лет');
            }
        }
    });
</script>
</body>

</html>
