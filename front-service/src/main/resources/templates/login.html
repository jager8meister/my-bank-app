<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <title>Банк — Вход</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class="bg-light">

<div id="notif-container"
     style="position:fixed;top:1rem;left:50%;transform:translateX(-50%);z-index:9999;min-width:320px;max-width:600px;display:flex;flex-direction:column;gap:0.5rem;">
    <div th:if="${info}"
         style="background:#198754;color:#fff;border-radius:6px;padding:0.75rem 1rem;display:flex;align-items:center;gap:0.75rem;box-shadow:0 4px 12px rgba(0,0,0,.25);">
        <span th:text="${info}" style="flex:1;font-weight:600;"></span>
        <button onclick="this.parentElement.remove()"
                style="background:none;border:none;color:#fff;font-size:1.4rem;line-height:1;cursor:pointer;padding:0;">&#x2715;</button>
    </div>
</div>

<div class="container p-2">
    <div class="row p-2">
        <div class="col">
            <h2><span class="badge text-bg-info text-white">Банк</span></h2>
        </div>
    </div>
    <div class="row p-2 justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">Вход в аккаунт</div>
                <div class="card-body">
                    <div class="d-grid mb-3">
                        <a href="/oauth2/authorization/keycloak"
                           class="btn btn-lg d-flex align-items-center justify-content-center gap-2"
                           style="background-color:#4d6b8a; color:white; border:none;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="white" viewBox="0 0 16 16">
                                <path d="M0 8a4 4 0 0 1 7.465-2H14a.5.5 0 0 1 .354.146l1.5 1.5a.5.5 0 0 1 0 .708l-1.5 1.5a.5.5 0 0 1-.708 0L13 9.207l-.646.647a.5.5 0 0 1-.708 0L11 9.207l-.646.647a.5.5 0 0 1-.354.146H7.465A4 4 0 0 1 0 8zm4-3a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/>
                            </svg>
                            Войти через Keycloak
                        </a>
                    </div>
                    <div class="text-center">
                        <a href="/register">Нет аккаунта? Зарегистрироваться</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    document.querySelectorAll('#notif-container > div').forEach(function(el) {
        setTimeout(function() { el.remove(); }, 30000);
    });
</script>
</body>

</html>
