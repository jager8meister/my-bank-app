<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <title>Банк — Вход</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body class="bg-light">
<div class="container p-2">
    <div class="row p-2">
        <div class="col">
            <h2>
                <span class="badge text-bg-info text-white">Банк</span>
            </h2>
        </div>
    </div>
    <div class="row p-2 justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    Вход в систему
                </div>
                <div class="card-body">
                    <div class="alert alert-danger" role="alert" th:if="${error}" th:text="${error}"></div>
                    <div class="alert alert-success" role="alert" th:if="${param.logout}">
                        Вы вышли из системы.
                    </div>
                    <form method="post" th:action="@{/login}">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <div class="form-group mb-3">
                            <h6><label for="login">Логин</label></h6>
                            <input type="text" class="form-control" id="login" name="login"
                                   placeholder="Введите логин" required autofocus>
                        </div>
                        <div class="form-group mb-3">
                            <h6><label for="password">Пароль</label></h6>
                            <input type="password" class="form-control" id="password" name="password"
                                   placeholder="Введите пароль" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Войти</button>
                    </form>
                    <div class="mt-3 text-center">
                        <a th:href="@{/register}">Ещё нет аккаунта? Зарегистрироваться</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>

</html>
