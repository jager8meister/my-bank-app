<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <title>Банк</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body class="bg-light">

    <div id="notif-container"
         style="position:fixed;top:1rem;left:50%;transform:translateX(-50%);z-index:9999;min-width:320px;max-width:600px;display:flex;flex-direction:column;gap:0.5rem;">

        <div th:if="${errors!=null}" th:each="error : ${errors}"
             style="background:#dc3545;color:#fff;border-radius:6px;padding:0.75rem 1rem;display:flex;align-items:center;gap:0.75rem;box-shadow:0 4px 12px rgba(0,0,0,.25);">
            <span th:text="${error}" style="flex:1;font-weight:600;"></span>
            <button onclick="this.parentElement.remove()"
                    style="background:none;border:none;color:#fff;font-size:1.4rem;line-height:1;cursor:pointer;padding:0;">&#x2715;</button>
        </div>

        <div th:if="${info!=null}" id="notif-info"
             style="background:#198754;color:#fff;border-radius:6px;padding:0.75rem 1rem;display:flex;align-items:center;gap:0.75rem;box-shadow:0 4px 12px rgba(0,0,0,.25);">
            <span th:text="${info}" style="flex:1;font-weight:600;"></span>
            <button onclick="this.parentElement.remove()"
                    style="background:none;border:none;color:#fff;font-size:1.4rem;line-height:1;cursor:pointer;padding:0;">&#x2715;</button>
        </div>

    </div>

    <div class="container p-2">
        <div class="row p-2">
            <div class="col">
                <div class="hstack gap-3">
                    <h2>
                        <span class="badge text-bg-info text-white">Банк</span>
                    </h2>
                    <div class="ms-auto">
                        <form method="post" th:action="@{/logout}">
                            <button type="submit" class="btn btn-outline-danger">
                                <i class="bi bi-box-arrow-right"></i> Выйти
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="row p-2">
            <div class="col">
                <div class="card">
                    <div class="card-header">
                        Обо мне
                    </div>
                    <div class="card-body gap-3">
                        <form method="post" th:action="@{/account}">
                            <div class="form-group">
                                <h6>
                                    <label for="name">Фамилия Имя</label>
                                </h6>
                                <p>
                                    <input type="text" class="form-control" id="name" name="name" placeholder="Иванов Иван" th:value="${name}" maxlength="100" required>
                                </p>
                            </div>
                            <div class="form-group">
                                <h6>
                                    <label for="birthdate">Дата рождения</label>
                                </h6>
                                <p>
                                    <input type="date" class="form-control" name="birthdate" id="birthdate" th:value="${birthdate}" required>
                                </p>
                            </div>
                            <div class="form-group">
                                <h6>Сумма на счету, руб</h6>
                                <p th:text="${sum}"/>
                            </div>
                            <button type="submit" class="btn btn-secondary">Сохранить изменения</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="row p-2">
            <div class="col">
                <div class="card">
                    <div class="card-header">
                        Операции с наличными
                    </div>
                    <div class="card-body gap-3">
                        <form method="post" th:action="@{/cash}">
                            <div class="form-group">
                                <h6>
                                    <label for="cash_value">Сумма, руб.</label>
                                </h6>
                                <p>
                                    <input type="number" class="form-control" id="cash_value" name="value" placeholder="100" min="1" max="1000000000" required>
                                </p>
                            </div>
                            <button type="submit" class="btn btn-secondary" name="action" value="PUT">Положить</button>
                            <button type="submit" class="btn btn-secondary" name="action" value="GET">Снять</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="row p-2">
            <div class="col">
                <div class="card">
                    <div class="card-header">
                        Переводы
                    </div>
                    <div class="card-body gap-3">
                        <form method="post" th:action="@{/transfer}">
                            <div class="form-group">
                                <h6>
                                    <label for="to_account">Кому</label>
                                </h6>
                                <p>
                                    <select class="form-select" id="to_account" name="login" required>
                                        <option value="" selected disabled>Выберите пользователя</option>
                                        <option th:each="account : ${accounts}" th:value="${account.login}" th:text="${account.name}"/>
                                    </select>
                                </p>
                            </div>
                            <div class="form-group">
                                <h6>
                                    <label for="transfer_value">Сумма, руб.</label>
                                </h6>
                                <p>
                                    <input type="number" class="form-control" name="value" id="transfer_value" placeholder="100" min="1" max="1000000000" required>
                                </p>
                            </div>
                            <button type="submit" class="btn btn-secondary">Перевести</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.querySelectorAll('#notif-container > div').forEach(function(el) {
            setTimeout(function() { el.remove(); }, 30000);
        });
    </script>
    <script>
        document.getElementById('birthdate').addEventListener('change', function() {
            const birthdate = new Date(this.value);
            const today = new Date();
            const age = today.getFullYear() - birthdate.getFullYear();
            const monthDiff = today.getMonth() - birthdate.getMonth();
            const dayDiff = today.getDate() - birthdate.getDate();

            const actualAge = monthDiff < 0 || (monthDiff === 0 && dayDiff < 0) ? age - 1 : age;

            if (actualAge < 18) {
                alert('Вам должно быть не менее 18 лет');
                this.value = '';
            }
        });

        document.querySelector('form[action="/account"]').addEventListener('submit', function(e) {
            const birthdate = new Date(document.getElementById('birthdate').value);
            const today = new Date();
            const age = today.getFullYear() - birthdate.getFullYear();
            const monthDiff = today.getMonth() - birthdate.getMonth();
            const dayDiff = today.getDate() - birthdate.getDate();

            const actualAge = monthDiff < 0 || (monthDiff === 0 && dayDiff < 0) ? age - 1 : age;

            if (actualAge < 18) {
                e.preventDefault();
                alert('Вам должно быть не менее 18 лет');
            }
        });
    </script>
</body>

</html>
