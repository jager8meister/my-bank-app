spring.application.name=front-service
spring.cloud.compatibility-verifier.enabled=false

server.port=${FRONT_SERVICE_PORT:8084}
gateway.url=http://${GATEWAY_SERVICE_HOST:gateway-service}:${GATEWAY_PORT:8080}
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
spring.kafka.consumer.auto-offset-reset=latest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=ru.yandex.practicum.mybankfront.dto.NotificationEvent

spring.security.oauth2.client.registration.keycloak.client-id=front-client
spring.security.oauth2.client.registration.keycloak.client-secret=${FRONT_CLIENT_SECRET:front-client-secret-key-67890}
spring.security.oauth2.client.registration.keycloak.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.keycloak.redirect-uri={baseUrl}/login/oauth2/code/keycloak
spring.security.oauth2.client.registration.keycloak.scope=openid,profile,email

spring.security.oauth2.client.provider.keycloak.authorization-uri=${KEYCLOAK_EXTERNAL_URL:http://localhost:9090}/realms/${KEYCLOAK_REALM:bank-realm}/protocol/openid-connect/auth
spring.security.oauth2.client.provider.keycloak.token-uri=${KEYCLOAK_INTERNAL_URL:http://keycloak:9090}/realms/${KEYCLOAK_REALM:bank-realm}/protocol/openid-connect/token
spring.security.oauth2.client.provider.keycloak.jwk-set-uri=${KEYCLOAK_INTERNAL_URL:http://keycloak:9090}/realms/${KEYCLOAK_REALM:bank-realm}/protocol/openid-connect/certs
spring.security.oauth2.client.provider.keycloak.end-session-uri=${KEYCLOAK_EXTERNAL_URL:http://localhost:9090}/realms/${KEYCLOAK_REALM:bank-realm}/protocol/openid-connect/logout
spring.security.oauth2.client.provider.keycloak.user-name-attribute=preferred_username
