server.port=8084
gateway.url=http://gateway-service:8080

spring.security.oauth2.client.registration.keycloak.client-id=front-client
spring.security.oauth2.client.registration.keycloak.client-secret=front-client-secret-key-67890
spring.security.oauth2.client.registration.keycloak.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.keycloak.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.keycloak.scope=openid,profile

spring.security.oauth2.client.provider.keycloak.authorization-uri=http://localhost:9090/realms/bank-realm/protocol/openid-connect/auth
spring.security.oauth2.client.provider.keycloak.token-uri=http://keycloak:9090/realms/bank-realm/protocol/openid-connect/token
spring.security.oauth2.client.provider.keycloak.user-info-uri=http://keycloak:9090/realms/bank-realm/protocol/openid-connect/userinfo
spring.security.oauth2.client.provider.keycloak.jwk-set-uri=http://keycloak:9090/realms/bank-realm/protocol/openid-connect/certs
spring.security.oauth2.client.provider.keycloak.user-name-attribute=preferred_username
spring.security.oauth2.client.provider.keycloak.end-session-endpoint=http://localhost:9090/realms/bank-realm/protocol/openid-connect/logout

spring.cloud.config.enabled=false
spring.config.import=optional:configserver:http://localhost:8888

spring.cloud.compatibility-verifier.enabled=false
