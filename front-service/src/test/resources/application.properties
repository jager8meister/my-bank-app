server.port=8084
gateway.url=http://gateway-service:8080
spring.kafka.bootstrap-servers=localhost:9092
spring.cloud.compatibility-verifier.enabled=false

spring.security.oauth2.client.registration.keycloak.client-id=front-client
spring.security.oauth2.client.registration.keycloak.client-secret=front-client-secret-key-67890
spring.security.oauth2.client.registration.keycloak.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.keycloak.redirect-uri=http://localhost:8084/login/oauth2/code/keycloak
spring.security.oauth2.client.registration.keycloak.scope=openid,profile,email

spring.security.oauth2.client.provider.keycloak.authorization-uri=http://localhost:9090/realms/bank-realm/protocol/openid-connect/auth
spring.security.oauth2.client.provider.keycloak.token-uri=http://localhost:9090/realms/bank-realm/protocol/openid-connect/token
spring.security.oauth2.client.provider.keycloak.jwk-set-uri=http://localhost:9090/realms/bank-realm/protocol/openid-connect/certs
spring.security.oauth2.client.provider.keycloak.end-session-uri=http://localhost:9090/realms/bank-realm/protocol/openid-connect/logout
spring.security.oauth2.client.provider.keycloak.user-name-attribute=preferred_username
