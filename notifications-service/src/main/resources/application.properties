spring.application.name=notifications-service
spring.cloud.compatibility-verifier.enabled=false

server.port=${NOTIFICATIONS_SERVICE_PORT:8086}

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
spring.kafka.consumer.group-id=notifications-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=ru.yandex.practicum.notifications.dto,ru.yandex.practicum.cash.dto,ru.yandex.practicum.transfer.dto,ru.yandex.practicum.accounts.dto
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=ru.yandex.practicum.notifications.dto.NotificationEvent
spring.kafka.listener.ack-mode=record

management.endpoints.web.exposure.include=health,prometheus

# Zipkin tracing
management.zipkin.tracing.endpoint=http://zipkin:9411/api/v2/spans
management.tracing.sampling.probability=1.0
management.tracing.enabled=true

# Prometheus metrics
management.metrics.distribution.percentiles-histogram.http.server.requests=true

spring.kafka.listener.observation-enabled=true
