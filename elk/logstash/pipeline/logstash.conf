input {
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  # Mask password fields in log messages
  if [message] =~ /password/ {
    mutate {
      gsub => ["message", "\"password\"\\s*:\\s*\"[^\"]*\"", "\"password\":\"***\""]
    }
  }

  # Mask account numbers (20-digit sequences used in Russian banking)
  if [message] =~ /\d{20}/ {
    mutate {
      gsub => ["message", "\\b\\d{20}\\b", "********************"]
    }
  }

  # Parse timestamp if present
  if [timestamp] {
    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
    }
  }

  # Add service tag from the 'service' field if present
  if [service] {
    mutate {
      add_tag => ["%{service}"]
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "bank-logs-%{+YYYY.MM.dd}"
  }
  stdout {
    codec => rubydebug { metadata => false }
  }
}
