version: "3.8"

services:
  elasticsearch:
    image: elasticsearch:8.13.4
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
      - cluster.name=bank-logs
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  logstash:
    image: logstash:8.13.4
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
    ports:
      - "5000:5000/tcp"
      - "9600:9600"
    environment:
      - LS_JAVA_OPTS=-Xms256m -Xmx256m
    depends_on:
      elasticsearch:
        condition: service_healthy

  kibana:
    image: kibana:8.13.4
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5601/api/status | grep -q available"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  kibana-init:
    image: alpine:3.19
    depends_on:
      kibana:
        condition: service_healthy
    restart: "no"
    command:
      - sh
      - -c
      - |
        apk add --no-cache curl -q
        echo 'Creating Kibana data view bank-logs-*...'
        curl -s -X POST 'http://kibana:5601/api/data_views/data_view' \
          -H 'kbn-xsrf: true' \
          -H 'Content-Type: application/json' \
          -d '{"data_view":{"title":"bank-logs-*","timeFieldName":"@timestamp","name":"Bank Logs"}}'
        echo
        echo 'Data view created'

volumes:
  elasticsearch_data:
