spring.application.name=transfer-service
spring.cloud.compatibility-verifier.enabled=false

server.port=${TRANSFER_SERVICE_PORT:8085}

services.accounts.host=${ACCOUNTS_SERVICE_HOST:accounts-service}
services.accounts.port=${ACCOUNTS_SERVICE_PORT:8081}

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_EXTERNAL_URL:http://localhost:9095}/realms/${KEYCLOAK_REALM:bank-realm}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_INTERNAL_URL:http://keycloak:9095}/realms/${KEYCLOAK_REALM:bank-realm}/protocol/openid-connect/certs

spring.security.oauth2.client.registration.keycloak.client-id=microservices-client
spring.security.oauth2.client.registration.keycloak.client-secret=${MICROSERVICES_CLIENT_SECRET}
spring.security.oauth2.client.registration.keycloak.authorization-grant-type=client_credentials
spring.security.oauth2.client.registration.keycloak.scope=microservice-scope

spring.security.oauth2.client.provider.keycloak.token-uri=${KEYCLOAK_INTERNAL_URL:http://keycloak:9095}/realms/${KEYCLOAK_REALM:bank-realm}/protocol/openid-connect/token

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

resilience4j.circuitbreaker.instances.accounts-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.accounts-service.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.accounts-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.accounts-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.accounts-service.permitted-number-of-calls-in-half-open-state=3

resilience4j.retry.instances.accounts-service.max-attempts=3
resilience4j.retry.instances.accounts-service.wait-duration=500ms
resilience4j.retry.instances.accounts-service.enable-exponential-backoff=true
resilience4j.retry.instances.accounts-service.exponential-backoff-multiplier=2

resilience4j.timelimiter.instances.accounts-service.timeout-duration=3s

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# Zipkin tracing
management.zipkin.tracing.endpoint=http://zipkin:9411/api/v2/spans
management.tracing.sampling.probability=1.0
management.tracing.enabled=true

# Prometheus metrics
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.observations.enable.spring.security=true

spring.kafka.template.observation-enabled=true
