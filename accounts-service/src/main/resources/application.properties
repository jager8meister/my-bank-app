spring.application.name=accounts-service
spring.cloud.compatibility-verifier.enabled=false

server.port=${ACCOUNTS_SERVICE_PORT:8081}

spring.r2dbc.url=r2dbc:postgresql://${POSTGRES_HOST:postgres}:${POSTGRES_PORT:5432}/${POSTGRES_DB:bankdb}
spring.r2dbc.username=${POSTGRES_USER:bankuser}
spring.r2dbc.password=${DB_PASSWORD}
spring.r2dbc.properties.schema=accounts_schema

spring.r2dbc.pool.enabled=true
spring.r2dbc.pool.initial-size=5
spring.r2dbc.pool.max-size=10

spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_EXTERNAL_URL:http://localhost:9090}/realms/${KEYCLOAK_REALM:bank-realm}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_INTERNAL_URL:http://keycloak:9090}/realms/${KEYCLOAK_REALM:bank-realm}/protocol/openid-connect/certs

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
