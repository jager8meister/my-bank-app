server.port=8083

spring.r2dbc.url=r2dbc:postgresql://postgres:5432/bankdb
spring.r2dbc.username=bankuser
spring.r2dbc.password=bankpass
spring.r2dbc.properties.schema=auth_schema

spring.r2dbc.pool.enabled=true
spring.r2dbc.pool.initial-size=5
spring.r2dbc.pool.max-size=10

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://keycloak:9090/realms/bank-realm
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://keycloak:9090/realms/bank-realm/protocol/openid-connect/certs
