server.port=8085

services.accounts.host=accounts-service
services.notifications.host=notifications-service

eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.instance.prefer-ip-address=true

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:9090/realms/bank-realm
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://keycloak:9090/realms/bank-realm/protocol/openid-connect/certs

spring.security.oauth2.client.registration.keycloak.client-id=microservices-client
spring.security.oauth2.client.registration.keycloak.client-secret=${MICROSERVICES_CLIENT_SECRET}
spring.security.oauth2.client.registration.keycloak.authorization-grant-type=client_credentials
spring.security.oauth2.client.registration.keycloak.scope=openid

spring.security.oauth2.client.provider.keycloak.token-uri=http://keycloak:9090/realms/bank-realm/protocol/openid-connect/token

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

logging.level.ru.yandex.practicum.transfer=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.cloud.gateway=DEBUG

resilience4j.circuitbreaker.instances.accounts-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.accounts-service.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.accounts-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.accounts-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.accounts-service.permitted-number-of-calls-in-half-open-state=3

resilience4j.retry.instances.accounts-service.max-attempts=3
resilience4j.retry.instances.accounts-service.wait-duration=500ms
resilience4j.retry.instances.accounts-service.enable-exponential-backoff=true
resilience4j.retry.instances.accounts-service.exponential-backoff-multiplier=2

resilience4j.timelimiter.instances.accounts-service.timeout-duration=3s
